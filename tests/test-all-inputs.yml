name: Test all inputs coverage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          repoToken: ${{ github.token }}
          firebaseServiceAccount: '{"type":"service_account","project_id":"test-project","private_key_id":"key123","private_key":"-----BEGIN RSA PRIVATE KEY-----\nMIIEowIBAAKCAQEA0Z3VS5JJcds3xHn/ygWep4PAtEsHAqKFpCMBRMXqMdMBBhPT\nfake-key-for-testing\n-----END RSA PRIVATE KEY-----\n","client_email":"test@test-project.iam.gserviceaccount.com","client_id":"123456789","auth_uri":"https://accounts.google.com/o/oauth2/auth","token_uri":"https://oauth2.googleapis.com/token"}'
          projectId: test-project
          channelId: test-channel
          target: default
          entryPoint: .
          expires: 7d
          disableComment: "true"
          force: "false"
      - name: Assert action ran (may fail due to invalid credentials)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "Action outcome: $OUTCOME"
          # The action is expected to fail with invalid credentials,
          # but we verify it was invoked (not skipped)
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action ran (outcome=$OUTCOME)"
