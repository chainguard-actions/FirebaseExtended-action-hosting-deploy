name: Test missing service account fails
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create dummy firebase.json
        run: |
          echo '{"hosting": {"public": "public"}}' > firebase.json
          mkdir -p public
          echo '<html><body>Test</body></html>' > public/index.html

      - id: action
        uses: .
        continue-on-error: true
        with:
          firebaseServiceAccount: ""
          projectId: test-project

      - name: Assert action failed due to missing service account
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with empty service account, but got outcome: $OUTCOME"
            exit 1
          fi
          echo "PASS: action correctly failed with empty service account"
