name: Test custom entryPoint input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create firebase.json in a subdirectory
        run: |
          mkdir -p myapp/public
          echo '{"hosting": {"public": "public"}}' > myapp/firebase.json
          echo '<html><body>Test</body></html>' > myapp/public/index.html

      - id: action
        uses: .
        continue-on-error: true
        with:
          firebaseServiceAccount: '{"type":"service_account","project_id":"test-project","private_key_id":"key123","private_key":"-----BEGIN RSA PRIVATE KEY-----\nMIIEowIBAAKCAQEA0Z3VS5JJcds3xHn/ygWep4PAtEsHAFPpF9y9KKZP0gBMBFGl\nFakeKeyForTestingPurposesOnly\n-----END RSA PRIVATE KEY-----\n","client_email":"test@test-project.iam.gserviceaccount.com","client_id":"123456789","auth_uri":"https://accounts.google.com/o/oauth2/auth","token_uri":"https://oauth2.googleapis.com/token"}'
          projectId: test-project
          entryPoint: myapp

      - name: Assert action failed (expected - invalid credentials)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid credentials, but got outcome: $OUTCOME"
            exit 1
          fi
          echo "PASS: action correctly failed (invalid credentials as expected)"
